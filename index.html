<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLab.Kids</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main-red: #ff5e6c; --bg-light: #f4f7f9; --text-dark: #1a1a1a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }

        /* HEADER ПО СКРИНШОТУ */
        header { 
            background: white; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 4px solid var(--main-red); box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 28px; color: var(--main-red); cursor: pointer; }
        .score-box { font-size: 18px; font-weight: 500; }

        /* SCREENS */
        .screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* КАРТОЧКИ КАК НА СКРИНШОТЕ */
        .mode-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .mode-card { 
            background: white; border-radius: 20px; padding: 25px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.2s; cursor: pointer; border: none;
        }
        .mode-card:active { transform: scale(0.97); }
        .mode-card i { font-size: 45px; display: block; margin-bottom: 10px; font-style: normal; }
        .mode-card span { font-size: 18px; font-weight: 500; }

        /* ИГРОВОЕ ПОЛЕ */
        #viewport { 
            background: white; width: 100%; height: 450px; border-radius: 25px; 
            position: relative; overflow: hidden; border: 2px solid #eee;
            display: flex; align-items: center; justify-content: center;
        }

        /* АНИМАЦИИ */
        .wheel-box { position: relative; width: 300px; height: 300px; border-radius: 50%; border: 8px solid #333; transition: 4s cubic-bezier(0.1, 0, 0.2, 1); background: conic-gradient(#ff5e6c 0 45deg, #ffcc00 45deg 90deg, #4da3ff 90deg 135deg, #2ecc71 135deg 180deg, #a55eea 180deg 225deg, #fa8231 225deg 270deg, #20bf6b 270deg 315deg, #eb3b5a 315deg 360deg); }
        .arrow { position: absolute; right: -20px; top: 50%; transform: translateY(-50%); width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 40px solid #f00; z-index: 10; }
        
        .mole { position: absolute; width: 80px; height: 110px; background: #78350f; bottom: -120px; border-radius: 40px 40px 10px 10px; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; cursor: pointer; border: 3px solid #451a03; }
        .mole.up { bottom: 40px; }

        .cloud { position: absolute; background: white; padding: 15px 25px; border-radius: 50px; border: 2px solid #4da3ff; animation: fly 7s linear infinite; cursor: pointer; font-weight: bold; white-space: nowrap; }
        @keyframes fly { from { left: 110%; } to { left: -150%; } }

        .slot-spin { font-size: 50px; font-weight: 800; color: var(--main-red); animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translateY(-2px); } 100% { transform: translateY(2px); } }

        /* BUTTONS */
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-red { background: var(--main-red); color: white; }
        .btn-ai { background: #8e44ad; color: white; }

        /* EDITOR */
        .q-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">GrammaLab.Kids</div>
    <div class="score-box">🏆 Очки: <span id="score">0</span></div>
</header>

<div id="scr-home" class="screen active">
    <h1 style="text-align:center; font-weight:500;">Выбери режим игры:</h1>
    <div class="mode-list">
        <div class="mode-card" onclick="startEdit('mole')"><i>🔨</i><span>Кроты</span></div>
        <div class="mode-card" onclick="startEdit('wheel')"><i>🎡</i><span>Колесо</span></div>
        <div class="mode-card" onclick="startEdit('plane')"><i>✈️</i><span>Самолет</span></div>
        <div class="mode-card" onclick="startEdit('anagram')"><i>🔡</i><span>Слова</span></div>
        <div class="mode-card" onclick="startEdit('slots')"><i>🎰</i><span>Слоты</span></div>
        <div class="mode-card" onclick="startEdit('quiz')"><i>📝</i><span>Викторина</span></div>
        <div class="mode-card" onclick="startEdit('pairs')"><i>👥</i><span>Пары</span></div>
        <div class="mode-card" onclick="startEdit('maze')"><i>👾</i><span>Лабиринт</span></div>
    </div>
    <button class="btn" style="background:#eee; margin-top:20px;" onclick="importCode()">📥 Загрузить по коду</button>
</div>

<div id="scr-edit" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Режим: <span id="m-name" style="color:var(--main-red)"></span></h2>
        <button class="btn-ai" style="width:auto; padding:8px 15px;" onclick="generateAI()">✨ ИИ: Русский язык</button>
    </div>
    <div id="q-list"></div>
    <button class="btn" onclick="addQ()">+ Добавить вопрос</button>
    <button class="btn btn-red" onclick="play()">ИГРАТЬ ▶️</button>
    <button class="btn" style="background:#27ae60; color:white;" onclick="exportCode()">📦 Получить код</button>
</div>

<div id="scr-game" class="screen">
    <h2 id="q-title" style="text-align:center; min-height:45px;"></h2>
    <div id="viewport"></div>
    <div id="controls" style="margin-top:20px; text-align:center;"></div>
</div>

<script>
    let mode = '', qs = [], cur = 0, score = 0, angle = 0;

    const nav = (id) => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); };

    function startEdit(m) { 
        mode = m; document.getElementById('m-name').innerText = m;
        document.getElementById('q-list').innerHTML = ''; addQ(); nav('scr-edit'); 
    }

    function addQ(t='', a=['','',''], c=0) {
        const div = document.createElement('div'); div.className = 'q-card';
        const id = Math.random().toString(36).substr(7);
        div.innerHTML = `<input type="text" placeholder="Вопрос" value="${t}" class="qi">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:5px;">
                ${[0,1,2].map(i => `<div><input type="radio" name="${id}" ${i===c?'checked':''}> <input type="text" value="${a[i]}" class="ai" placeholder="Ответ"></div>`).join('')}
            </div>`;
        document.getElementById('q-list').appendChild(div);
    }

    function generateAI() {
        const topic = prompt("Тема по русскому языку (например: Спряжения):");
        if(!topic) return;
        addQ("Как пишется (НЕ)ЗНАЮ?", ["Раздельно", "Слитно", "Через дефис"], 0);
        addQ("Вставьте букву: Ц..пленок", ["ы", "и", "е"], 0);
    }

    function exportCode() {
        save();
        const code = btoa(encodeURIComponent(JSON.stringify({m: mode, d: qs})));
        prompt("Твой код игры:", code);
    }

    function importCode() {
        const c = prompt("Вставь код:");
        if(c) { const data = JSON.parse(decodeURIComponent(atob(c))); mode = data.m; qs = data.d; play(); }
    }

    function save() {
        qs = [];
        document.querySelectorAll('.q-card').forEach(el => {
            const t = el.querySelector('.qi').value;
            const opts = [];
            el.querySelectorAll('div > div').forEach(o => {
                opts.push({ t: o.querySelector('.ai').value, ok: o.querySelector('input').checked });
            });
            if(t) qs.push({t, opts});
        });
    }

    function play() {
        save(); if(!qs.length) return;
        cur = 0; score = 0; document.getElementById('score').innerText = "0";
        nav('scr-game'); render();
    }

    function render() {
        const v = document.getElementById('viewport'); const ct = document.getElementById('controls');
        const q = qs[cur]; v.innerHTML = ''; ct.innerHTML = '';
        document.getElementById('q-title').innerText = q.t;

        const check = (ok) => {
            if(ok) { score++; document.getElementById('score').innerText = score; }
            cur++; if(cur < qs.length) render(); else finish();
        };

        if(mode === 'wheel') {
            v.innerHTML = `<div class="arrow"></div><div id="wh" class="wheel-box"></div>`;
            qs.forEach((it, i) => {
                const s = document.createElement('div');
                s.style = `position:absolute; width:100%; top:50%; left:50%; transform:translate(-50%,-50%) rotate(${i*(360/qs.length)}deg) translateX(70px); color:white; font-weight:bold; font-size:10px;`;
                s.innerText = it.t.substring(0,10); document.getElementById('wh').appendChild(s);
            });
            ct.innerHTML = `<button class="btn btn-red" onclick="spin()">КРУТИТЬ</button>`;
        } 
        else if(mode === 'mole') {
            q.opts.forEach((o, i) => {
                const m = document.createElement('div'); m.className = 'mole'; m.innerText = o.t;
                m.style.left = (15+i*30)+'%'; m.onclick = () => check(o.ok); v.appendChild(m);
                setTimeout(() => m.classList.add('up'), 100+i*200);
            });
        }
        else if(mode === 'plane') {
            q.opts.forEach((o, i) => {
                const c = document.createElement('div'); c.className = 'cloud'; c.innerText = o.t;
                c.style.top = (60+i*110)+'px'; c.onclick = () => check(o.ok); v.appendChild(c);
            });
        }
        else if(mode === 'anagram') {
            const corr = q.opts.find(o => o.ok).t;
            const letters = corr.split('').sort(() => Math.random() - 0.5);
            let res = ""; v.innerHTML = `<h1 id="res" style="color:var(--main-red); font-size:50px;">_</h1>`;
            letters.forEach(l => {
                const b = document.createElement('button'); b.className = 'btn'; b.style.width='50px'; b.innerText = l;
                b.onclick = () => { res += l; document.getElementById('res').innerText = res; if(res.length === corr.length) check(res === corr); };
                ct.appendChild(b);
            });
        }
        else if(mode === 'slots') {
            v.innerHTML = `<div id="sl" class="slot-spin">${q.opts[0].t}</div>`;
            let idx = 0; const tm = setInterval(() => { idx=(idx+1)%q.opts.length; document.getElementById('sl').innerText = q.opts[idx].t; }, 80);
            ct.innerHTML = `<button class="btn btn-red" onclick="clearInterval(${tm}); check(qs[${cur}].opts[${idx}].ok)">СТОП</button>`;
        }
        else { // Викторина, Пары, Лабиринт
            q.opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-red'; b.innerText = o.t;
                b.onclick = () => check(o.ok); ct.appendChild(b);
            });
        }
    }

    function spin() {
        angle += 1800 + Math.random()*360;
        document.getElementById('wh').style.transform = `rotate(${angle}deg)`;
        setTimeout(() => { cur = Math.floor(Math.random()*qs.length); render(); }, 4000);
    }

    function finish() {
        document.getElementById('viewport').innerHTML = `<h1>Ура! Очки: ${score}</h1><button class="btn btn-red" onclick="location.reload()">В меню</button>`;
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
    }
</script>
</body>
</html>
