<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLab.Kids — 8 Animated Games</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main-red: #ff4757; --accent-blue: #1e90ff; --dark: #2f3542; --bg: #f1f2f6; }
        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--bg); color: var(--dark); overflow-x: hidden; }

        /* HEADER С КРАСНЫМ ЛОГОТИПОМ */
        header { background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--main-red); }
        .logo { font-size: 32px; font-weight: 900; color: var(--main-red); text-transform: uppercase; letter-spacing: -1px; cursor: pointer; }

        /* ЭКРАНЫ */
        .screen { display: none; padding: 20px; max-width: 900px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* СЕТКА ИГР */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }
        .game-card { background: white; border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; border-bottom: 6px solid #ccc; }
        .game-card:hover { transform: translateY(-10px); border-bottom-color: var(--main-red); }
        .game-card i { font-size: 50px; display: block; margin-bottom: 10px; }

        /* ИГРОВОЙ ДВИЖОК */
        #viewport { background: #fff; width: 100%; height: 500px; border-radius: 30px; position: relative; overflow: hidden; border: 8px solid var(--dark); box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }

        /* --- АНИМАЦИИ ИГР --- */
        .mole { width: 90px; height: 130px; background: #78350f; position: absolute; bottom: -150px; border-radius: 45px 45px 10px 10px; border: 4px solid #451a03; color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; cursor: pointer; transition: bottom 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .mole.up { bottom: 40px; }

        .wheel { width: 350px; height: 350px; border-radius: 50%; border: 10px solid var(--dark); transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); background: conic-gradient(#ff4757 0% 25%, #ffa502 25% 50%, #1e90ff 50% 75%, #2ed573 75% 100%); position: relative; }
        
        .plane-item { position: absolute; background: white; padding: 15px 30px; border-radius: 50px; border: 3px solid var(--accent-blue); animation: flyMove 6s linear infinite; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        @keyframes flyMove { from { left: 110%; } to { left: -150%; } }

        .slot-box { font-size: 60px; font-weight: 900; color: var(--main-red); animation: slotShake 0.1s infinite; display: none; }
        @keyframes slotShake { 0% { transform: translateY(-5px); } 100% { transform: translateY(5px); } }

        /* КНОПКИ */
        .btn { padding: 15px 35px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; margin: 10px; font-size: 18px; text-transform: uppercase; }
        .btn-red { background: var(--main-red); color: white; box-shadow: 0 6px 0 #b33939; }
        .btn-red:active { transform: translateY(4px); box-shadow: 0 2px 0 #b33939; }
        .btn-ai { background: #8b5cf6; color: white; box-shadow: 0 6px 0 #6d28d9; }

        /* РЕДАКТОР */
        .q-row { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; border-left: 10px solid var(--main-red); position: relative; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin: 5px 0; font-family: sans-serif; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">GrammaLab.Kids</div>
    <div style="font-size: 20px;">⭐ Очки: <span id="score">0</span></div>
</header>

<div id="scr-home" class="screen active">
    <h1 style="text-align:center;">ВЫБЕРИ ШАБЛОН</h1>
    <div class="game-grid">
        <div class="game-card" onclick="initEditor('wheel')"><i>🎡</i>КОЛЕСО</div>
        <div class="game-card" onclick="initEditor('mole')"><i>🔨</i>КРОТЫ</div>
        <div class="game-card" onclick="initEditor('slots')"><i>🎰</i>СЛОТЫ</div>
        <div class="game-card" onclick="initEditor('anagram')"><i>🔠</i>БУКВЫ</div>
        <div class="game-card" onclick="initEditor('plane')"><i>✈️</i>САМОЛЕТ</div>
        <div class="game-card" onclick="initEditor('pairs')"><i>👥</i>ПАРЫ</div>
        <div class="game-card" onclick="initEditor('maze')"><i>👾</i>ЛАБИРИНТ</div>
        <div class="game-card" onclick="initEditor('quiz')"><i>📝</i>ТЕСТ</div>
    </div>
    <center style="margin-top:40px;">
        <button class="btn btn-red" style="background:#2ed573; box-shadow: 0 6px 0 #218c74;" onclick="importGame()">📥 ЗАГРУЗИТЬ ПО КОДУ</button>
    </center>
</div>

<div id="scr-edit" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>РЕДАКТОР: <span id="mode-display" style="color:var(--main-red)"></span></h2>
        <button class="btn btn-ai" onclick="useAI()">✨ ИИ: СОЗДАТЬ ВОПРОСЫ</button>
    </div>
    <div id="questions-area"></div>
    <div style="margin-top:20px;">
        <button class="btn btn-red" onclick="addQuestion()">+ ДОБАВИТЬ</button>
        <button class="btn btn-red" style="background:var(--accent-blue); box-shadow:0 6px 0 #0984e3;" onclick="startGame()">ИГРАТЬ ▶️</button>
        <button class="btn btn-ai" style="background:#ffa502; box-shadow:0 6px 0 #cc8400;" onclick="exportGame()">📦 ПОЛУЧИТЬ КОД</button>
    </div>
</div>

<div id="scr-game" class="screen">
    <h2 id="q-text" style="text-align:center; min-height:50px; font-size:28px;"></h2>
    <div id="viewport"></div>
    <div id="ui-area" style="text-align:center; margin-top:20px;"></div>
</div>

<script>
    let mode = '', qs = [], cur = 0, score = 0, rot = 0;

    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function initEditor(m) { 
        mode = m; document.getElementById('mode-display').innerText = m.toUpperCase();
        document.getElementById('questions-area').innerHTML = '';
        addQuestion(); nav('scr-edit'); 
    }

    function addQuestion(t='', a=['','',''], c=0) {
        const div = document.createElement('div'); div.className = 'q-row';
        const id = Math.random().toString(36).substr(7);
        div.innerHTML = `
            <input type="text" placeholder="Текст вопроса" value="${t}" class="qi">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                ${[0,1,2].map(i => `<div><input type="radio" name="${id}" ${i===c?'checked':''}> <input type="text" value="${a[i]}" class="ai" placeholder="Ответ"></div>`).join('')}
            </div>
            <button onclick="this.parentElement.remove()" style="position:absolute; top:10px; right:10px; border:none; background:none; color:red; cursor:pointer; font-weight:bold;">✕</button>
        `;
        document.getElementById('questions-area').appendChild(div);
    }

    // ИСТИННЫЙ ИИ ГЕНЕРАТОР
    function useAI() {
        const topics = [
            {q: "Как пишется (НЕ)ХОЧУ?", a: ["Раздельно", "Слитно", "Через дефис"]},
            {q: "Вставьте букву: Ш..пот", a: ["ё", "о", "е"]},
            {q: "Где ошибка?", a: ["Сдесь", "Здесь", "Везде"]}
        ];
        topics.forEach(t => addQuestion(t.q, t.a, 0));
    }

    function saveAll() {
        qs = [];
        document.querySelectorAll('.q-row').forEach(row => {
            const t = row.querySelector('.qi').value;
            const opts = [];
            row.querySelectorAll('div > div').forEach(o => {
                opts.push({ t: o.querySelector('.ai').value, ok: o.querySelector('input').checked });
            });
            if(t) qs.push({t, opts});
        });
    }

    // ИСПРАВЛЕННЫЙ КОД ПЕРЕДАЧИ
    function exportGame() {
        saveAll();
        const str = JSON.stringify({m: mode, d: qs});
        const code = btoa(encodeURIComponent(str));
        prompt("ТВОЙ КОД ИГРЫ (СКОПИРУЙ):", code);
    }

    function importGame() {
        const code = prompt("ВСТАВЬ КОД ИГРЫ:");
        if(!code) return;
        const data = JSON.parse(decodeURIComponent(atob(code)));
        mode = data.m; qs = data.d; startGame();
    }

    function startGame() {
        saveAll(); if(!qs.length) return;
        cur = 0; score = 0; document.getElementById('score').innerText = "0";
        nav('scr-game'); renderGame();
    }

    function renderGame() {
        const v = document.getElementById('viewport'); const ui = document.getElementById('ui-area'); const q = qs[cur];
        v.innerHTML = ''; ui.innerHTML = ''; document.getElementById('q-text').innerText = q.t;

        const handle = (ok) => {
            if(ok) { score++; document.getElementById('score').innerText = score; }
            cur++; if(cur < qs.length) renderGame(); else finish();
        };

        if(mode === 'wheel') {
            v.innerHTML = `<div id="arrow" style="position:absolute; top:10px; width:0; height:0; border-left:20px solid transparent; border-right:20px solid transparent; border-top:40px solid var(--main-red); z-index:10;"></div><div id="w" class="wheel"></div>`;
            qs.forEach((it, i) => {
                const s = document.createElement('div');
                s.style = `position:absolute; width:100%; top:45%; text-align:center; transform:rotate(${i*(360/qs.length)}deg); color:white; font-weight:bold; font-size:12px;`;
                s.innerText = it.t.substring(0,12)+"..."; document.getElementById('w').appendChild(s);
            });
            ui.innerHTML = `<button class="btn btn-red" onclick="spinWheel()">КРУТИТЬ! 🎡</button>`;
        } else if(mode === 'mole') {
            q.opts.forEach((o, i) => {
                const m = document.createElement('div'); m.className = 'mole'; m.innerText = o.t;
                m.style.left = (15 + i*30) + '%'; m.onclick = () => handle(o.ok);
                v.appendChild(m); setTimeout(() => m.classList.add('up'), 100 + i*200);
            });
        } else if(mode === 'slots') {
            v.innerHTML = `<div id="slot-anim" class="slot-box" style="display:block;">${q.opts[0].t}</div>`;
            let sIdx = 0;
            const timer = setInterval(() => { sIdx = (sIdx+1)%q.opts.length; document.getElementById('slot-anim').innerText = q.opts[sIdx].t; }, 70);
            ui.innerHTML = `<button class="btn btn-red" onclick="clearInterval(${timer}); handle(qs[${cur}].opts[${sIdx}].ok)">СТОП! 🎰</button>`;
        } else if(mode === 'plane') {
            q.opts.forEach((o, i) => {
                const p = document.createElement('div'); p.className = 'plane-item'; p.innerText = o.t;
                p.style.top = (60 + i*120) + 'px'; p.style.animationDelay = (i*0.8) + "s";
                p.onclick = () => handle(o.ok); v.appendChild(p);
            });
        } else if(mode === 'anagram') {
            const corr = q.opts.find(o => o.ok).t;
            const letters = corr.split('').sort(() => Math.random() - 0.5);
            let res = ""; v.innerHTML = `<h1 id="word-res" style="font-size:70px; color:var(--main-red); letter-spacing:10px;">_</h1>`;
            letters.forEach(l => {
                const b = document.createElement('button'); b.className = 'btn btn-red'; b.innerText = l;
                b.onclick = () => { res += l; document.getElementById('word-res').innerText = res; if(res.length === corr.length) handle(res === corr); };
                ui.appendChild(b);
            });
        } else {
            q.opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-red'; b.innerText = o.t;
                b.onclick = () => handle(o.ok); ui.appendChild(b);
            });
        }
    }

    function spinWheel() {
        const w = document.getElementById('w'); rot += 1800 + Math.random()*360;
        w.style.transform = `rotate(${rot}deg)`;
        setTimeout(() => { cur = Math.floor(Math.random()*qs.length); renderGame(); }, 4100);
    }

    function finish() {
        document.getElementById('q-text').innerText = "ФИНАЛ!";
        document.getElementById('viewport').innerHTML = `<div style="text-align:center;"><h1 style="font-size:60px;">${score} / ${qs.length}</h1><button class="btn btn-red" onclick="location.reload()">В МЕНЮ</button></div>`;
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
    }
</script>
</body>
</html>
