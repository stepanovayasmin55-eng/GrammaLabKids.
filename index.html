<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLab.Kids — 8 в 1</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #2563eb; --s: #10b981; --r: #ef4444; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow-x: hidden; }

        /* HEADER */
        nav { background: #1e293b; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; color: #60a5fa; cursor: pointer; }

        /* SCREENS */
        .screen { display: none; padding: 2rem; max-width: 900px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; transition: 0.2s; border: 2px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card:hover { border-color: var(--p); transform: translateY(-3px); }
        .card i { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }

        /* GAME STAGE */
        #stage { background: white; width: 100%; height: 450px; border-radius: 20px; position: relative; overflow: hidden; border: 6px solid #334155; display: flex; align-items: center; justify-content: center; }

        /* ANIMATED ELEMENTS */
        .mole { width: 80px; height: 100px; background: #78350f; position: absolute; bottom: -120px; border-radius: 40px 40px 10px 10px; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; cursor: pointer; border: 3px solid #451a03; }
        .mole.up { bottom: 40px; }
        
        .wheel { width: 320px; height: 320px; border-radius: 50%; border: 8px solid #1e293b; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); background: conic-gradient(#ef4444 0 25%, #f59e0b 25% 50%, #3b82f6 50% 75%, #10b981 75% 100%); position: relative; }
        
        .plane-obj { position: absolute; background: white; padding: 10px 20px; border-radius: 30px; border: 2px solid var(--p); animation: fly 6s linear infinite; cursor: pointer; font-weight: bold; }
        @keyframes fly { from { left: 110%; } to { left: -150%; } }

        /* UI */
        .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; margin: 5px; }
        .btn-p { background: var(--p); color: white; box-shadow: 0 4px 0 #1d4ed8; }
        .btn-p:active { transform: translateY(2px); box-shadow: 0 2px 0 #1d4ed8; }
        .btn-ai { background: #8b5cf6; color: white; box-shadow: 0 4px 0 #6d28d9; }

        .q-item { background: white; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; border-left: 5px solid var(--p); }
        input { width: 100%; padding: 0.6rem; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">GrammaLab.Kids</div>
    <div>Звёзды: <span id="score">0</span> ⭐</div>
</nav>

<div id="home" class="screen active">
    <h1>Выберите игру:</h1>
    <div class="grid">
        <div class="card" onclick="openEditor('wheel')"><i>🎡</i>Колесо</div>
        <div class="card" onclick="openEditor('mole')"><i>🔨</i>Кроты</div>
        <div class="card" onclick="openEditor('anagram')"><i>🔠</i>Анаграмма</div>
        <div class="card" onclick="openEditor('plane')"><i>✈️</i>Самолет</div>
        <div class="card" onclick="openEditor('slots')"><i>🎰</i>Слоты</div>
        <div class="card" onclick="openEditor('pairs')"><i>👥</i>Пары</div>
        <div class="card" onclick="openEditor('maze')"><i>👾</i>Лабиринт</div>
        <div class="card" onclick="openEditor('quiz')"><i>📝</i>Викторина</div>
    </div>
    <div style="text-align:center; margin-top:30px;">
        <button class="btn btn-p" style="background:#10b981; box-shadow:0 4px 0 #059669;" onclick="importCode()">📥 Загрузить код</button>
    </div>
</div>

<div id="editor" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Настройка <span id="mode-name"></span></h2>
        <button class="btn btn-ai" onclick="runAI()">✨ ИИ Генератор</button>
    </div>
    <div id="questions"></div>
    <button class="btn" onclick="addQ()">+ Добавить вопрос</button>
    <button class="btn btn-p" onclick="startPlay()">ИГРАТЬ ▶️</button>
    <button class="btn btn-ai" style="background:#22c55e; box-shadow:0 4px 0 #16a34a;" onclick="exportCode()">📦 Код для передачи</button>
</div>

<div id="game" class="screen">
    <h2 id="q-title" style="text-align:center; height:40px;"></h2>
    <div id="stage"></div>
    <div id="controls" style="text-align:center; margin-top:20px;"></div>
</div>

<script>
    let mode = '', qs = [], cur = 0, score = 0, rot = 0;

    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function openEditor(m) { mode = m; qs = []; document.getElementById('questions').innerHTML = ''; document.getElementById('mode-name').innerText = m; addQ(); nav('editor'); }

    function addQ(t='', a=['','',''], c=0) {
        const d = document.createElement('div'); d.className = 'q-item';
        const id = Math.random().toString(36).substr(7);
        d.innerHTML = `
            <input type="text" placeholder="Вопрос" value="${t}" class="qi">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                ${[0,1,2].map(i => `<div><input type="radio" name="${id}" ${i===c?'checked':''}> <input type="text" value="${a[i]}" class="ai" placeholder="Ответ ${i+1}"></div>`).join('')}
            </div>
        `;
        document.getElementById('questions').appendChild(d);
    }

    function runAI() {
        const topic = prompt("Введите тему (например: Спряжения):");
        if(!topic) return;
        addQ("Как пишется (НЕ)ХОЧУ?", ["Раздельно", "Слитно", "Через дефис"], 0);
        addQ("Выберите верное:", ["Шёл", "Шол", "Шел"], 0);
    }

    function save() {
        qs = [];
        document.querySelectorAll('.q-item').forEach(el => {
            const t = el.querySelector('.qi').value;
            const opts = [];
            el.querySelectorAll('div > div').forEach(opt => {
                opts.push({ t: opt.querySelector('.ai').value, ok: opt.querySelector('input').checked });
            });
            if(t) qs.push({t, opts});
        });
    }

    function exportCode() {
        save();
        const code = btoa(unescape(encodeURIComponent(JSON.stringify({m: mode, d: qs}))));
        prompt("Твой код игры GrammaLab:", code);
    }

    function importCode() {
        const c = prompt("Вставь код:"); if(!c) return;
        const data = JSON.parse(decodeURIComponent(escape(atob(c))));
        mode = data.m; qs = data.d; startPlay();
    }

    function startPlay() { save(); if(!qs.length) return; cur=0; score=0; nav('game'); render(); }

    function render() {
        const st = document.getElementById('stage'); const ct = document.getElementById('controls');
        const q = qs[cur];
        st.innerHTML = ''; ct.innerHTML = ''; document.getElementById('q-title').innerText = q.t;

        const check = (ok) => {
            if(ok) { score++; document.getElementById('score').innerText = score; }
            cur++; if(cur < qs.length) render(); else finish();
        };

        // 8 МЕХАНИК
        if(mode === 'wheel') {
            st.innerHTML = `<div style="position:absolute; top:0; width:0; height:0; border-left:20px solid transparent; border-right:20px solid transparent; border-top:40px solid var(--r); z-index:10;"></div><div id="w" class="wheel"></div>`;
            qs.forEach((item, i) => {
                const tx = document.createElement('div');
                tx.style = `position:absolute; width:100%; top:45%; text-align:center; transform:rotate(${i*(360/qs.length)}deg); color:white; font-weight:bold; font-size:12px;`;
                tx.innerText = item.t.substring(0,10) + ".."; document.getElementById('w').appendChild(tx);
            });
            ct.innerHTML = `<button class="btn btn-p" onclick="spin()">КРУТИТЬ! 🎡</button>`;
        } else if(mode === 'mole') {
            q.opts.forEach((o, i) => {
                const m = document.createElement('div'); m.className = 'mole'; m.innerText = o.t;
                m.style.left = (10 + i*30) + '%'; m.onclick = () => check(o.ok);
                st.appendChild(m); setTimeout(() => m.classList.add('up'), 200+i*300);
            });
        } else if(mode === 'anagram') {
            const correct = q.opts.find(o => o.ok).t;
            const letters = correct.split('').sort(() => Math.random() - 0.5);
            let typed = "";
            st.innerHTML = `<h1 id="res" style="font-size:60px; color:var(--p); letter-spacing:10px;">_</h1>`;
            letters.forEach(l => {
                const b = document.createElement('button'); b.className = 'btn'; b.innerText = l;
                b.onclick = () => { typed += l; document.getElementById('res').innerText = typed; if(typed.length === correct.length) check(typed === correct); };
                ct.appendChild(b);
            });
        } else if(mode === 'plane') {
            q.opts.forEach((o, i) => {
                const p = document.createElement('div'); p.className = 'plane-obj'; p.innerText = o.t;
                p.style.top = (50 + i*120) + 'px'; p.onclick = () => check(o.ok); st.appendChild(p);
            });
        } else if(mode === 'slots') {
            st.innerHTML = `<div id="s" style="font-size:40px; font-weight:900;">???</div>`;
            let idx = 0;
            const iv = setInterval(() => { idx=(idx+1)%q.opts.length; document.getElementById('s').innerText = q.opts[idx].t; }, 100);
            ct.innerHTML = `<button class="btn btn-p" onclick="clearInterval(${iv}); check(qs[${cur}].opts[${idx}].ok)">СТОП! 🎰</button>`;
        } else if(mode === 'pairs') {
            st.innerHTML = `<p>Найдите правильный ответ (нажмите на кнопку)</p>`;
            q.opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-p'; b.innerText = o.t;
                b.onclick = () => check(o.ok); st.appendChild(b);
            });
        } else if(mode === 'maze') {
            st.innerHTML = `<div style="text-align:center;">👾 Пройдите к правильному ответу<br></div>`;
            q.opts.forEach(o => {
                const z = document.createElement('button'); z.className = 'btn btn-p'; z.innerText = o.t;
                z.onclick = () => check(o.ok); st.appendChild(z);
            });
        } else {
            // Викторина
            q.opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-p'; b.innerText = o.t;
                b.onclick = () => check(o.ok); st.appendChild(b);
            });
        }
    }

    function spin() {
        const w = document.getElementById('w');
        rot += 1800 + Math.random() * 360;
        w.style.transform = `rotate(${rot}deg)`;
        setTimeout(() => {
            const nextIdx = Math.floor(Math.random() * qs.length);
            cur = nextIdx; mode = 'quiz'; render();
        }, 4000);
    }

    function finish() {
        document.getElementById('stage').innerHTML = `<h1 style="font-size:3rem;">Твой результат: ${score} / ${qs.length}</h1><button class="btn btn-p" onclick="location.reload()">В МЕНЮ</button>`;
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
    }
</script>
</body>
</html>
