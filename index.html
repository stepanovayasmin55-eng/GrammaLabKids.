<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLab 7-in-1 Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --red: #ff5e6c; --blue: #4da3ff; --bg: #f4f7f9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }

        /* Шапка */
        header { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--red); height: 60px; box-sizing: border-box; }
        .logo { font-size: 24px; color: var(--red); font-weight: 900; cursor: pointer; }

        /* Экраны */
        .screen { display: none; padding: 15px; max-width: 500px; margin: 0 auto; height: calc(100vh - 60px); overflow-y: auto; }
        .active { display: block; }

        /* Плитки меню */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; border: none; transition: 0.2s; }
        .card:active { transform: scale(0.95); }
        .card i { font-size: 40px; display: block; margin-bottom: 8px; font-style: normal; }

        /* Игровая область */
        #viewport { 
            background: white; width: 100%; height: 450px; border-radius: 30px; 
            position: relative; overflow: hidden; border: 2px solid #eee; margin-top: 10px;
        }

        .btn-home { position: absolute; top: 10px; left: 10px; z-index: 100; padding: 8px 15px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 20px; cursor: pointer; }

        /* Стили для игр */
        .wheel-box { width: 300px; height: 300px; margin: 40px auto; position: relative; transition: 4s cubic-bezier(0.1, 0, 0.1, 1); border-radius: 50%; border: 8px solid #333; }
        .plane-hero { position: absolute; font-size: 45px; left: 20px; transition: 0.4s ease; z-index: 10; }
        .cloud-item { position: absolute; background: white; padding: 12px 20px; border-radius: 30px; border: 2px solid var(--blue); cursor: pointer; animation: flyLeft 4s linear infinite; white-space: nowrap; font-weight: bold; }
        @keyframes flyLeft { from { left: 110%; } to { left: -150%; } }

        /* Кнопки и формы */
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-red { background: var(--red); color: white; box-shadow: 0 4px 0 #d64552; }
        .btn-ai { background: #8e44ad; color: white; }

        #game-modal { position: absolute; inset: 20px; background: white; border-radius: 25px; padding: 20px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; box-shadow: 0 0 40px rgba(0,0,0,0.2); text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">GrammaLab</div>
    <div style="font-weight: bold; font-size: 20px;">🏆 <span id="score">0</span></div>
</header>

<div id="scr-home" class="screen active">
    <div class="grid">
        <div class="card" onclick="openEd('wheel')"><i>🎡</i>Колесо</div>
        <div class="card" onclick="openEd('plane')"><i>✈️</i>Самолет</div>
        <div class="card" onclick="openEd('maze')"><i>👾</i>Лабиринт</div>
        <div class="card" onclick="openEd('anagram')"><i>🔡</i>Анаграмма</div>
        <div class="card" onclick="openEd('mole')"><i>🔨</i>Кроты</div>
        <div class="card" onclick="openEd('pairs')"><i>👥</i>Пары</div>
        <div class="card" onclick="openEd('quiz')"><i>📝</i>Викторина</div>
    </div>
    <button class="btn" style="background:#eee; margin-top:20px;" onclick="importLink()">📥 Загрузить игру</button>
</div>

<div id="scr-edit" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="ed-title"></h2>
        <button class="btn-ai" onclick="generateAI()" style="padding:8px 15px; border-radius:10px; border:none; cursor:pointer;">✨ Умный ИИ</button>
    </div>
    <div id="q-container"></div>
    <button class="btn" onclick="addQ()">+ Вопрос</button>
    <button class="btn btn-red" onclick="run()">ИГРАТЬ ▶️</button>
    <button class="btn" style="background:#27ae60; color:white;" onclick="exportLink()">📦 Поделиться игрой</button>
</div>

<div id="scr-game" class="screen">
    <div id="viewport">
        <button class="btn-home" onclick="location.reload()">🏠 Меню</button>
        <div id="game-task" style="text-align:center; margin-top:50px; font-weight:bold; font-size:18px; padding:0 10px;"></div>
        <div id="game-modal">
            <h2 id="modal-title"></h2>
            <div id="modal-buttons" style="width:100%"></div>
        </div>
    </div>
    <div id="game-ui" style="margin-top:10px;"></div>
</div>

<script>
    let mode='', qs=[], score=0, rot=0;
    let activeQs = [];

    // ПОЛУЧЕНИЕ ИЗ ССЫЛКИ
    window.onload = () => {
        const url = new URLSearchParams(window.location.search);
        if(url.has('data')) {
            try {
                const d = JSON.parse(decodeURIComponent(escape(atob(url.get('data')))));
                mode = d.m; qs = d.d; run();
            } catch(e) { console.error("Ошибка загрузки"); }
        }
    };

    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function openEd(m) { mode=m; document.getElementById('ed-title').innerText=m; document.getElementById('q-container').innerHTML=''; addQ(); nav('scr-edit'); }

    function addQ(t='', a=['','',''], c=0) {
        const d = document.createElement('div'); d.style="background:white; padding:15px; border-radius:15px; margin-bottom:10px; border-left:6px solid var(--red);";
        const id = Math.random().toString(36).substr(7);
        d.innerHTML = `<input type="text" placeholder="Задание/Слово" value="${t}" class="qi" style="width:100%; margin-bottom:8px; border:1px solid #ddd; padding:8px; border-radius:8px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                ${[0,1,2].map(i => `<div><input type="radio" name="${id}" ${i===c?'checked':''}> <input type="text" value="${a[i]}" class="ai" style="width:70%; font-size:12px;"></div>`).join('')}
            </div>`;
        document.getElementById('q-container').appendChild(d);
    }

    function generateAI() {
        const theme = prompt("Введите тему для ИИ (напр. Грамматика):");
        if(!theme) return;
        document.getElementById('q-container').innerHTML = '';
        for(let i=0; i<4; i++) addQ(`${theme} - Вопрос ${i+1}`, ["Верно", "Нет", "Ошибка"], 0);
    }

    function save() {
        qs = [];
        document.querySelectorAll('#q-container > div').forEach(el => {
            const t = el.querySelector('.qi').value;
            const opts = [];
            el.querySelectorAll('div > div').forEach(o => opts.push({t: o.querySelector('.ai').value, ok: o.querySelector('input').checked}));
            if(t) qs.push({t, opts});
        });
        activeQs = JSON.parse(JSON.stringify(qs));
    }

    function exportLink() {
        save();
        const data = btoa(unescape(encodeURIComponent(JSON.stringify({m: mode, d: qs}))));
        const url = window.location.origin + window.location.pathname + "?data=" + data;
        prompt("Скопируйте ссылку и отправьте другу:", url);
    }

    function importLink() {
        const link = prompt("Вставьте ссылку:");
        if(link && link.includes('data=')) {
            const code = link.split('data=')[1];
            const d = JSON.parse(decodeURIComponent(escape(atob(code))));
            mode = d.m; qs = d.d; run();
        }
    }

    function run() {
        save(); if(!qs.length) return;
        score=0; document.getElementById('score').innerText="0";
        nav('scr-game'); render();
    }

    function render() {
        const v = document.getElementById('viewport'); const ui = document.getElementById('game-ui');
        v.querySelectorAll('.obj').forEach(o => o.remove());
        ui.innerHTML = ''; document.getElementById('game-modal').style.display = 'none';
        
        if(activeQs.length === 0) {
            document.getElementById('game-task').innerText = "Все задания выполнены! 🏆";
            confetti(); return;
        }

        const q = activeQs[0];
        document.getElementById('game-task').innerText = (mode==='wheel') ? "Крути колесо!" : q.t;

        if(mode === 'wheel') {
            v.innerHTML += `<div class="obj" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); width:0; height:0; border-top:15px solid transparent; border-bottom:15px solid transparent; border-left:30px solid var(--red); z-index:10;"></div>
                            <div id="wh" class="wheel-box obj"></div>`;
            const wh = document.getElementById('wh');
            activeQs.forEach((_, i) => {
                const s = document.createElement('div');
                const deg = 360/activeQs.length;
                s.style = `position:absolute; width:100%; height:100%; background:hsl(${i*50},70%,60%); clip-path: polygon(50% 50%, ${50+50*Math.cos(i*deg*Math.PI/180)}% ${50+50*Math.sin(i*deg*Math.PI/180)}%, ${50+50*Math.cos((i+1)*deg*Math.PI/180)}% ${50+50*Math.sin((i+1)*deg*Math.PI/180)}%);`;
                wh.appendChild(s);
            });
            ui.innerHTML = `<button class="btn btn-red" onclick="spinWheel()">КРУТИТЬ</button>`;
        } else if(mode === 'plane') {
            v.innerHTML += `<div id="pl" class="plane-hero obj">✈️</div>`;
            q.opts.forEach((o, i) => {
                const c = document.createElement('div'); c.className='cloud-item obj'; c.innerText=o.t;
                c.style.top=(100+i*110)+'px';
                c.onclick = () => { document.getElementById('pl').style.top=c.offsetTop+'px'; setTimeout(()=>check(o.ok, 0), 500); };
                v.appendChild(c);
            });
        } else {
            q.opts.forEach(o => {
                const b = document.createElement('button'); b.className='btn btn-red'; b.innerText=o.t;
                b.onclick = () => check(o.ok, 0); ui.appendChild(b);
            });
        }
    }

    function spinWheel() {
        rot += 1440 + Math.random()*360;
        document.getElementById('wh').style.transform = `rotate(${rot}deg)`;
        setTimeout(() => {
            const idx = Math.floor(Math.random()*activeQs.length);
            const q = activeQs[idx];
            const modal = document.getElementById('game-modal');
            document.getElementById('modal-title').innerText = q.t;
            const btnBox = document.getElementById('modal-buttons'); btnBox.innerHTML = '';
            q.opts.forEach(o => {
                const b = document.createElement('button'); b.className='btn btn-red'; b.innerText=o.t;
                b.onclick = () => { if(o.ok) {score++; document.getElementById('score').innerText=score; confetti();} activeQs.splice(idx, 1); render(); };
                btnBox.appendChild(b);
            });
            modal.style.display = 'flex';
        }, 4000);
    }

    function check(ok, idx) {
        if(ok) { score++; document.getElementById('score').innerText=score; confetti(); }
        activeQs.splice(idx, 1); render();
    }
</script>
</body>
</html>
